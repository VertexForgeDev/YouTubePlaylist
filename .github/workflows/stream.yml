name: Global Media Streamer - RNS

on:
  workflow_dispatch:
  schedule:
    - cron: '10 0 * * *'
    - cron: '40 5 * * *'
    - cron: '20 11 * * *'
    - cron: '40 17 * * *'

concurrency:
  group: youtube-live-rns
  cancel-in-progress: true

jobs:
  core-process:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    permissions:
      contents: write

    steps:
      - name: Initialize environment
        uses: actions/checkout@v4

      - name: Component installation
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Resource allocation
        env:
          DB_SOURCE: ${{ secrets.VIDEO_URLS }}
        run: |
          set +e
          rm -f *.mp4
          if [ -z "$DB_SOURCE" ]; then echo "Error: VIDEO_URLS is empty"; exit 1; fi
          
          # Tvoja povodna overena logika na nahodny vyber videa
          VID_LIST=$(echo "$DB_SOURCE")
          SELECTED_URL=$(echo "$VID_LIST" | shuf -n 1)
          
          echo "Downloading from: $SELECTED_URL"
          curl -L "$SELECTED_URL" -o "video_na_stream.mp4"
          
          if [ ! -f "video_na_stream.mp4" ]; then echo "Download failed"; exit 1; fi
          echo "LAST_IDX=999" >> $GITHUB_ENV
          set -e

      - name: Transmission start
        env:
          TARGET_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          ffmpeg -re -stream_loop -1 -i video_na_stream.mp4 \
          -c:v libx264 -preset veryfast -tune film \
          -b:v 4500k -maxrate 5000k -bufsize 10000k \
          -pix_fmt yuv420p -g 60 -r 30 \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$TARGET_KEY"

      - name: System logging
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase || true
          echo "Sync RNS: $(date)" > last_run_rns.txt
          git add last_run_rns.txt
          git commit -m "update RNS $(date) [skip ci]" || true
          git push origin main || true
