name: Global Media Streamer

on:
  workflow_dispatch:
  schedule:
    - cron: '10 0 * * *'
    - cron: '40 5 * * *'
    - cron: '20 11 * * *'
    - cron: '40 17 * * *'

concurrency:
  group: streamer-logic
  cancel-in-progress: true

jobs:
  core-process:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    permissions:
      contents: write

    steps:
      - name: Authorization check
        run: |
          if [ "${{ github.repository_owner }}" != "TVOJE_PRIHLASOVACIE_MENO" ]; then
            echo "Security breach detected. Unauthorized repository owner."
            exit 1
          fi

      - name: Initialize environment
        uses: actions/checkout@v4

      - name: Component installation
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Resource allocation
        env:
          DB_SOURCE: ${{ secrets.VIDEO_URLS }}
        run: |
          rm -rf *.mp4
          
          # Convert secret string to array
          IFS=$'\n' read -rd '' -a VIDEOS <<< "$DB_SOURCE"
          
          COUNT=${#VIDEOS[@]}
          SEED=$(($(date +%s%N) + RANDOM))
          INDEX=$(( SEED % COUNT ))
          SELECTED_URL=${VIDEOS[$INDEX]}
          
          echo "Selected resource index: $INDEX"
          
          # Secure download
          curl -L "$SELECTED_URL" -o "media_asset.mp4"
          
          echo "Asset size:"
          du -sh media_asset.mp4
          echo "LAST_IDX=$INDEX" >> $GITHUB_ENV

      - name: Transmission start
        env:
          TARGET_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          ffmpeg -re -stream_loop -1 -i media_asset.mp4 \
          -c:v libx264 -preset veryfast -tune film \
          -b:v 4500k -maxrate 5000k -bufsize 10000k \
          -pix_fmt yuv420p -g 60 -r 30 \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$TARGET_KEY"

      - name: System logging
        if: always()
        run: |
          git config --global user.name "system-bot"
          git config --global user.email "bot@internal.com"
          git pull origin main --rebase
          echo "Sync: $(date)" > status.log
          echo "Active Index: ${{ env.LAST_IDX }}" >> status.log
          git add status.log
          git commit -m "System state update $(date)" || exit 0
          git push origin main
